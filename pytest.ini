[pytest]
# pytest-homeassistant-custom-component ships autouse *async* fixtures, so
# pytest-asyncio must run in auto mode or every test errors at setup.
asyncio_mode = auto
# phacc enables pytest-socket (network is blocked by default); allow loopback
# so the Home Assistant test harness can bind its internal sockets.
addopts = --allow-hosts=127.0.0.1,localhost
